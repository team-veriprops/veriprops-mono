name: Deploy Prod

on:
  push:
    branches:
      - prod
  workflow_dispatch:

env:
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  Run_Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r test-requirements.txt

      - name: Run Alembic migrations
        run: |
          export appodus_active_env=test
          alembic upgrade head
      - name: Run Tests
        run: |
          export appodus_active_env=test
          pytest

  Prepare_DB:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: |
          export appodus_active_env=prod
          alembic upgrade head
